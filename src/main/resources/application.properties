spring.application.name=startSpring
server.port=${PORT:2000}

# Database Configuration
# Using environment variables for security. These will be set in Render/TiDB Cloud.
spring.datasource.url=jdbc:mysql://${DB_HOST:gateway01.ap-southeast-1.prod.aws.tidbcloud.com}:${DB_PORT:4000}/${DB_NAME:health_db}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=${DB_USE_SSL:true}&enabledTLSProtocols=TLSv1.2,TLSv1.3
spring.datasource.username=${DB_USERNAME:3Za8CzxMxSnVo18.root}
spring.datasource.password=${DB_PASSWORD:sPEDoG3cQwfcScHC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Prevent OOM on small instances (Render Free Tier)
# JVM flags should be set in the Dockerfile, but we can set some Hibernate optimizations here.
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true


